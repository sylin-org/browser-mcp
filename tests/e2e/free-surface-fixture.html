<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ghostlight free-surface fixture</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, sans-serif;
      }
      body {
        margin: 0;
        background: #f4f8fc;
        color: #142033;
      }
      main {
        width: min(960px, calc(100% - 48px));
        margin: 36px auto;
      }
      [data-journey] {
        display: none;
      }
      body[data-active="toolbar"] [data-journey="toolbar"],
      body[data-active="form"] [data-journey="form"],
      body[data-active="viewport"] [data-journey="viewport"],
      body[data-active="product"] [data-journey="product"] {
        display: block;
      }
      .card {
        padding: 24px;
        border: 1px solid #b8c9dc;
        border-radius: 16px;
        background: #fff;
        box-shadow: 0 12px 28px rgba(25, 52, 82, 0.08);
      }
      .toolbar {
        display: grid;
        grid-template-columns: repeat(8, 64px);
        gap: 12px;
      }
      .toolbar button {
        width: 64px;
        height: 56px;
        border: 1px solid #8da7c2;
        border-radius: 12px;
        background: #eef6ff;
        color: #174d78;
        font-size: 22px;
      }
      .panels {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
      }
      label,
      input,
      button {
        font: inherit;
      }
      input {
        box-sizing: border-box;
        width: 100%;
        padding: 10px 12px;
      }
      .spacer {
        height: 1100px;
        border-left: 2px dashed #c6d5e5;
        margin-left: 20px;
      }
      .action {
        padding: 10px 16px;
        border: 1px solid #4d83ad;
        border-radius: 10px;
        background: #dff2ff;
        color: #153d5e;
      }
      .price {
        font-size: 32px;
        font-weight: 700;
      }
    </style>
  </head>
  <body data-active="toolbar">
    <main>
      <section class="card" data-journey="toolbar" aria-labelledby="toolbar-title">
        <h1 id="toolbar-title">Dense toolbar</h1>
        <p>Choose the control named Review changes.</p>
        <div class="toolbar" role="toolbar" aria-label="Document actions">
          <button type="button" aria-label="Add item">+</button>
          <button type="button" aria-label="Move left">&lt;</button>
          <button type="button" aria-label="Move right">&gt;</button>
          <button type="button" aria-label="Duplicate item">=</button>
          <button type="button" aria-label="Review changes">?</button>
          <button type="button" aria-label="Mark favorite">*</button>
          <button type="button" aria-label="Remove item">-</button>
          <button type="button" aria-label="More actions">...</button>
        </div>
      </section>

      <section class="card" data-journey="form" aria-labelledby="form-title">
        <h1 id="form-title">Repeated form</h1>
        <p>Focus the approved invoice amount, not the draft amount.</p>
        <div class="panels">
          <section aria-labelledby="draft-title">
            <h2 id="draft-title">Draft invoice</h2>
            <label id="draft-amount-label" for="draft-amount">Amount</label>
            <input id="draft-amount" aria-labelledby="draft-title draft-amount-label" value="125">
          </section>
          <section aria-labelledby="approved-title">
            <h2 id="approved-title">Approved invoice</h2>
            <label id="approved-amount-label" for="approved-amount">Amount</label>
            <input id="approved-amount" aria-labelledby="approved-title approved-amount-label" value="120">
          </section>
        </div>
      </section>

      <section class="card" data-journey="viewport" aria-labelledby="viewport-title">
        <h1 id="viewport-title">Mixed viewport</h1>
        <p>Use the Review control that is visible before scrolling.</p>
        <button class="action" type="button" aria-label="Review visible summary">Review</button>
        <div class="spacer" aria-hidden="true"></div>
        <button class="action" type="button" aria-label="Review archived details">Review</button>
      </section>

      <section class="card" data-journey="product" aria-labelledby="product-title">
        <h1 id="product-title">Product</h1>
        <p id="product-description">Deterministic comparison page.</p>
        <p class="price" id="product-price">$0</p>
        <button class="action" type="button" aria-label="Select this product">Select</button>
      </section>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const journey = params.get("journey") || "toolbar";
      const knownJourneys = new Set(["toolbar", "form", "viewport", "product"]);
      document.body.dataset.active = knownJourneys.has(journey) ? journey : "toolbar";

      if (journey === "product") {
        const products = {
          alpha: { title: "Product Alpha", description: "Fast delivery", price: "$48" },
          beta: { title: "Product Beta", description: "Lowest price", price: "$42" },
          gamma: { title: "Product Gamma", description: "Longest warranty", price: "$51" },
        };
        const product = products[params.get("product")] || products.alpha;
        document.title = product.title;
        document.getElementById("product-title").textContent = product.title;
        document.getElementById("product-description").textContent = product.description;
        document.getElementById("product-price").textContent = product.price;
      }
    </script>
  </body>
</html>
