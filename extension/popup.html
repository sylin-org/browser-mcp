<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Browser MCP</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    width: 260px;
    margin: 0;
    padding: 12px;
    color: #1a1a1a;
  }
  h1 {
    font-size: 14px;
    margin: 0 0 8px 0;
  }
  #status {
    font-size: 13px;
    margin-bottom: 10px;
  }
  #toggle {
    width: 100%;
    padding: 8px;
    font-size: 13px;
    cursor: pointer;
  }
  #toggle:disabled {
    cursor: default;
    opacity: 0.6;
  }
  #shortcut-note {
    font-size: 11px;
    color: #666;
    margin-top: 10px;
  }
</style>
</head>
<body>
  <h1>Browser MCP</h1>
  <div id="status">Loading...</div>
  <button id="toggle" disabled>Loading...</button>
  <div id="shortcut-note">
    Keyboard shortcut: Alt+Shift+P by default; change it at chrome://extensions/shortcuts
  </div>
  <script src="popup.js"></script>
</body>
</html>
